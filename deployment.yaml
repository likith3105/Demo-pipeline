apiVersion: apps/v1
kind: Deployment
metadata:
  name: aida-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aida-api
  template:
    metadata:
      labels:
        app: aida-api
    spec:
      containers:
      - name: aida-api
        image: YOUR_DOCKERHUB_USERNAME/aida-api:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aida-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: aida-api